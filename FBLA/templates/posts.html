{% extends "admin.html" %}
{% block title %}
post
{% endblock %}
{% block main %}

{% if posts %}
<div class="custom-welcome">
    <h2>Here are your posts:</h2>
</div>
{% else %}
<div >
    <h2 class = 'custom-welcome' >You do not have any posts currently</h2>
</div>
{% endif %}

    
        
        <div class="row justify-content-center">
            <button type="button" class="btn btn-primary w-75" data-bs-toggle="modal" data-bs-target="#addPost">
                Add Post
            </button>
            <div class="col-md-6">
                {% for post in posts %}
                <div class="card">
                    <div class="post">
                        <p>{{ post.added_by }}
                        <h4>{{ post.content }}
                    </div>
                </div>
                {% endfor %}
        </div>
                    
                
            </div>
        </div>
        
        
        <div class="modal fade" id="addPost" tabindex="-1" role="dialog"aria-labelledby="addPost" >
            <div class="modal-dialog" role = "document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addPostModalLabel">Add Post</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form method="POST" action= "/post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="content" class="form-label">Make post</label>
                                <textarea class="form-control" id="content" name="content" required rows="3" ></textarea>
                            </div>
                            

    
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary">Post</button>
                            </div>
                        </form>
                    
                    
                </div>
            </div>
        </div>
    </div>
   

    
{% endblock %}
